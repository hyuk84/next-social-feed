<!doctype html>

<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary: '#3f3fe4',
              'background-light': '#f6f6f8',
              'background-dark': '#111121',
              kakao: '#FEE500',
            },
            fontFamily: {
              display: ['Plus Jakarta Sans', 'sans-serif'],
            },
            borderRadius: {
              DEFAULT: '1rem',
              lg: '2rem',
              xl: '3rem',
              full: '9999px',
            },
          },
        },
      };
    </script>
  </head>
  <body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center p-4 md:p-8"
  >
    <div
      class="flex flex-col lg:flex-row w-full max-w-[1200px] min-h-[800px] bg-white dark:bg-slate-900 rounded-xl shadow-2xl overflow-hidden"
    >
      <!-- Left Side: Visual/Illustration -->
      <div
        class="hidden lg:flex lg:w-1/2 relative bg-primary/10 overflow-hidden"
      >
        <div
          class="absolute inset-0 z-0 bg-cover bg-center opacity-90"
          data-alt="Group of diverse creators collaborating in a modern studio"
          style="
            background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuA-ZD2YwzYTVTkdfQcNJk0evXq9EHLTu50kXJ7DIo7RCx4l3wJCJRRaupzhF2IUo4U9LcUAZL43UzqBv5YUTznwBavPisw-0zrcbQtwtCc2XfWqQp96_z3lrrzx-gn8xBQAlsSMk48FQOJcZhomJT3jxkX07qinkrL37uL7TVVINmnlf-Vjw9icVZmFdlYHPaE26CMAcweNaIjg3muAA98eNSTZ_-T1MCh3kG-8Wmw_Kp2vsOoUUl5puG71jlCcgKcBz-hu4DXDtfQb');
          "
        ></div>
        <div
          class="absolute inset-0 bg-gradient-to-tr from-primary/80 to-transparent z-10"
        ></div>
        <div
          class="relative z-20 flex flex-col justify-end p-16 text-white h-full"
        >
          <div class="flex items-center gap-2 mb-6">
            <div class="bg-white p-2 rounded-lg">
              <svg
                class="w-8 h-8 text-primary"
                fill="currentColor"
                viewbox="0 0 48 48"
              >
                <path
                  clip-rule="evenodd"
                  d="M24 4H6V17.3333V30.6667H24V44H42V30.6667V17.3333H24V4Z"
                  fill-rule="evenodd"
                ></path>
              </svg>
            </div>
            <span class="text-2xl font-bold tracking-tight">SocialFeed</span>
          </div>
          <h1 class="text-5xl font-black leading-tight mb-4">
            The home of digital creators.
          </h1>
          <p class="text-lg text-white/80 max-w-md">
            Join thousands of creators sharing their moments and stories with
            the world. Your journey starts here.
          </p>
        </div>
      </div>
      <!-- Right Side: Auth Form -->
      <div
        class="w-full lg:w-1/2 p-8 md:p-16 flex flex-col justify-center overflow-y-auto"
      >
        <div class="max-w-[420px] mx-auto w-full">
          <div class="mb-10">
            <h2 class="text-3xl font-bold text-slate-900 dark:text-white mb-2">
              Welcome Back
            </h2>
            <p class="text-slate-500 dark:text-slate-400">
              Please enter your details to sign in to your account.
            </p>
          </div>
          <form class="space-y-5">
            <!-- Username Field (Conditional/Visible in Signup mode - shown here for layout demo) -->
            <!-- <div class="hidden">
                        <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Username</label>
                        <input type="text" placeholder="Choose a unique username" class="w-full px-4 py-3.5 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all">
                    </div> -->
            <div>
              <label
                class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2"
                >Email Address</label
              >
              <input
                class="w-full px-4 py-3.5 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all"
                placeholder="example@email.com"
                type="email"
              />
            </div>
            <div>
              <div class="flex justify-between items-center mb-2">
                <label
                  class="text-sm font-semibold text-slate-700 dark:text-slate-300"
                  >Password</label
                >
                <a
                  class="text-xs font-bold text-primary hover:underline"
                  href="#"
                  >Forgot password?</a
                >
              </div>
              <div class="relative">
                <input
                  class="w-full px-4 py-3.5 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all"
                  placeholder="••••••••"
                  type="password"
                />
                <button
                  class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600"
                  type="button"
                >
                  <span class="material-symbols-outlined text-[20px]"
                    >visibility</span
                  >
                </button>
              </div>
            </div>
            <div class="flex items-center">
              <input
                class="w-5 h-5 rounded text-primary border-slate-300 focus:ring-primary cursor-pointer"
                id="remember"
                type="checkbox"
              />
              <label
                class="ml-3 text-sm text-slate-600 dark:text-slate-400 cursor-pointer"
                for="remember"
                >Stay logged in</label
              >
            </div>
            <button
              class="w-full py-4 bg-primary text-white font-bold rounded-lg hover:opacity-90 active:scale-[0.98] transition-all shadow-lg shadow-primary/20"
              type="submit"
            >
              Login to Account
            </button>
          </form>
          <!-- Divider -->
          <div class="relative my-8">
            <div class="absolute inset-0 flex items-center">
              <div
                class="w-full border-t border-slate-200 dark:border-slate-700"
              ></div>
            </div>
            <div class="relative flex justify-center text-sm">
              <span
                class="px-4 bg-white dark:bg-slate-900 text-slate-500 font-medium"
                >Or continue with</span
              >
            </div>
          </div>
          <!-- Social Logins -->
          <div class="grid grid-cols-3 gap-4 mb-10">
            <button
              class="flex items-center justify-center py-3 px-4 border border-slate-200 dark:border-slate-700 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors group"
            >
              <svg class="w-5 h-5" viewbox="0 0 24 24">
                <path
                  d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                  fill="#4285F4"
                ></path>
                <path
                  d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                  fill="#34A853"
                ></path>
                <path
                  d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                  fill="#FBBC05"
                ></path>
                <path
                  d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                  fill="#EA4335"
                ></path>
              </svg>
            </button>
            <button
              class="flex items-center justify-center py-3 px-4 bg-kakao rounded-lg hover:opacity-90 transition-opacity"
            >
              <span
                class="material-symbols-outlined text-slate-900 text-[24px] fill-current"
                >chat_bubble</span
              >
            </button>
            <button
              class="flex items-center justify-center py-3 px-4 border border-slate-200 dark:border-slate-700 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors"
            >
              <svg
                class="w-5 h-5 dark:fill-white"
                fill="currentColor"
                viewbox="0 0 24 24"
              >
                <path
                  d="M17.05 20.28c-.96.95-2.04 1.83-3.14 1.83-1.07 0-1.48-.68-2.73-.68-1.24 0-1.74.65-2.69.65-1.05 0-2.25-.97-3.23-1.97C3.17 17.92 1.9 14.54 1.9 11.5c0-4.66 3.01-7.1 5.92-7.1 1.54 0 2.85.98 3.84.98 1 0 2.45-1.12 4.24-1.12 1.84 0 4.23.95 5.56 2.81-2.9 1.67-2.42 5.72.63 7.02-.92 2.27-2.18 4.31-3.04 6.19zM15.42 2.84c-.79 1-2.13 1.76-3.28 1.66-.14-1.16.48-2.43 1.25-3.34 1.13-1.24 2.58-1.9 3.47-2.16.1 1.29-.65 2.84-1.44 3.84z"
                ></path>
              </svg>
            </button>
          </div>
          <div class="text-center">
            <p class="text-slate-600 dark:text-slate-400">
              Don't have an account?
              <a class="text-primary font-bold hover:underline ml-1" href="#"
                >Sign up for free</a
              >
            </p>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
